name: Attribution Integrity

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  attribution-integrity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check attribution markers
        run: |
          python3 - <<'PY'
          from pathlib import Path
          blocked = [
              "Co-" + "authored-by:",
              "Generated " + "by",
              "Created " + "with",
              "Written " + "by",
          ]
          excluded_names = {"LICENSE", "LICENSE.md", "NOTICE", "COPYING", "COPYRIGHT"}
          excluded_dirs = {".git", "_quarantine"}
          failures = []
          for path in Path(".").rglob("*"):
              if any(part in excluded_dirs for part in path.parts) or not path.is_file():
                  continue
              if path.name.upper() in {n.upper() for n in excluded_names}:
                  continue
              try:
                  text = path.read_text(encoding="utf-8")
              except UnicodeDecodeError:
                  continue
              lowered = text.lower()
              for token in blocked:
                  if token.lower() in lowered:
                      failures.append(str(path))
                      break
          if failures:
              raise SystemExit("\n".join(sorted(failures)))
          PY
