# Aeostara Version Agent
# Automatically labels PRs with SemVer bump type and creates version tags on merge.
# Copyright (c) 2026 James Daley. All Rights Reserved.

name: Version Agent

on:
  pull_request:
    types: [opened, edited, synchronize]
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  label-pr:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Determine SemVer label from PR title
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.pull_request.title;
            const labels = context.payload.pull_request.labels.map(l => l.name);

            // Remove existing semver labels
            const semverLabels = ['semver:major', 'semver:minor', 'semver:patch'];
            for (const label of semverLabels) {
              if (labels.includes(label)) {
                await github.rest.issues.removeLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.payload.pull_request.number,
                  name: label
                }).catch(() => {});
              }
            }

            // Determine bump type from conventional commit prefix
            let bump = 'patch';
            if (/^BREAKING[\s-]CHANGE/i.test(title) || /^[a-z]+(\(.+\))?!:/.test(title)) {
              bump = 'major';
            } else if (/^feat(\(.+\))?:/.test(title)) {
              bump = 'minor';
            }
            // fix:, perf:, docs:, chore:, refactor:, test:, ci: all default to patch

            const newLabel = `semver:${bump}`;

            // Ensure the label exists
            try {
              await github.rest.issues.getLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: newLabel
              });
            } catch {
              const colors = { 'semver:major': 'e11d48', 'semver:minor': '2563eb', 'semver:patch': '16a34a' };
              await github.rest.issues.createLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                name: newLabel,
                color: colors[newLabel],
                description: `SemVer ${bump} version bump`
              });
            }

            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              labels: [newLabel]
            });

            core.info(`Applied label: ${newLabel}`);

  tag-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Determine version bump and create tag
        uses: actions/github-script@v7
        with:
          script: |
            const { execSync } = require('child_process');

            // Get the latest tag
            let latestTag = 'v0.0.0';
            try {
              latestTag = execSync('git describe --tags --abbrev=0 2>/dev/null', { encoding: 'utf8' }).trim();
            } catch {
              core.info('No existing tags found, starting from v0.0.0');
            }

            // Parse current version
            const match = latestTag.match(/^v(\d+)\.(\d+)\.(\d+)$/);
            if (!match) {
              core.setFailed(`Invalid tag format: ${latestTag}`);
              return;
            }
            let [, major, minor, patch] = match.map(Number);

            // Get merged PR labels or analyze commit messages
            const commits = execSync(
              `git log ${latestTag}..HEAD --pretty=format:"%s" 2>/dev/null || git log --pretty=format:"%s"`,
              { encoding: 'utf8' }
            ).trim().split('\n').filter(Boolean);

            if (commits.length === 0) {
              core.info('No new commits since last tag');
              return;
            }

            // Determine bump from commit messages
            let bump = 'patch';
            for (const msg of commits) {
              if (/^BREAKING[\s-]CHANGE/i.test(msg) || /^[a-z]+(\(.+\))?!:/.test(msg)) {
                bump = 'major';
                break;
              } else if (/^feat(\(.+\))?:/.test(msg)) {
                bump = 'minor';
              }
            }

            // Apply bump
            if (bump === 'major') { major++; minor = 0; patch = 0; }
            else if (bump === 'minor') { minor++; patch = 0; }
            else { patch++; }

            const newTag = `v${major}.${minor}.${patch}`;

            // Check if tag already exists
            try {
              execSync(`git rev-parse ${newTag} 2>/dev/null`, { encoding: 'utf8' });
              core.info(`Tag ${newTag} already exists, skipping`);
              return;
            } catch {
              // Tag doesn't exist, good
            }

            // Create and push tag
            execSync(`git tag -a ${newTag} -m "Release ${newTag}"`, { encoding: 'utf8' });
            execSync(`git push origin ${newTag}`, { encoding: 'utf8' });

            core.info(`Created tag: ${newTag}`);
