name: Windows Build

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  windows-build:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4

      - name: Configure vcpkg environment
        shell: pwsh
        run: |
          if (-not $env:VCPKG_ROOT) {
              $env:VCPKG_ROOT = $env:VCPKG_INSTALLATION_ROOT
          }
          if (-not $env:VCPKG_ROOT) {
              throw "VCPKG_ROOT is not configured."
          }
          $toolchain = Join-Path $env:VCPKG_ROOT "scripts/buildsystems/vcpkg.cmake"
          if (-not (Test-Path $toolchain)) {
              throw "vcpkg toolchain file not found at $toolchain"
          }
          "VCPKG_ROOT=$env:VCPKG_ROOT" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Configure
        shell: pwsh
        run: cmake --preset debug

      - name: Build
        shell: pwsh
        run: cmake --build --preset debug

      - name: Test
        shell: pwsh
        run: ctest --preset debug

      - name: Architecture guardrails
        shell: pwsh
        run: ./Scripts/verify-aeostara-guardrails.ps1
