# Aeostara Wiki Agent
# Maintains comprehensive, branch-scoped wiki pages with visual dashboards.

name: Wiki Agent

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          path: src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone wiki repository
        run: |
          set -euo pipefail

          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki || {
            mkdir -p wiki
            cd wiki
            git init
            git checkout -b main
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          }

      - name: Generate wiki pages
        run: |
          set -euo pipefail
          python3 src/.github/scripts/generate_wiki_pages.py \
            --src-dir src \
            --wiki-dir wiki \
            --branch-name "${{ github.ref_name }}" \
            --commit-sha "${{ github.sha }}"

      - name: Commit and push wiki updates
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd wiki

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && echo "No wiki changes" && exit 0

          short_sha="$(echo "$COMMIT_SHA" | cut -c1-7)"
          git commit -m "docs(wiki): sync ${BRANCH_NAME} (${short_sha})"

          WIKI_BRANCH="main"
          git ls-remote --heads origin master >/dev/null 2>&1 && WIKI_BRANCH="master"

          for attempt in 1 2 3; do
            git fetch origin "$WIKI_BRANCH" 2>/dev/null || true
            git rebase "origin/${WIKI_BRANCH}" 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
            }

            if git push origin "HEAD:${WIKI_BRANCH}"; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying in 3s"
            sleep 3
          done

          echo "Failed to push wiki updates after retries"
          exit 1
