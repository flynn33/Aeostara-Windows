# Aeostara Wiki Agent
# Creates and updates branch-scoped GitHub wiki pages on repo changes.
# Syncs root docs, platform docs, architecture specs, algorithms, interfaces,
# contracts, acceptance criteria, and language-aware API/module references.
# Copyright (c) 2026 James Daley. All Rights Reserved.

name: Wiki Agent

on:
  push:
    branches:
      - '**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: wiki-sync
  cancel-in-progress: false

jobs:
  sync-wiki:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source branch
        uses: actions/checkout@v4
        with:
          path: src

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone wiki repository
        run: |
          set -euo pipefail

          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki || {
            mkdir -p wiki
            cd wiki
            git init
            git checkout -b main
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          }

      - name: Generate wiki pages
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail

          slug="${BRANCH_NAME//\//__slash__}"
          slug="${slug// /-}"
          slug="$(echo "$slug" | tr -cd '[:alnum:]_.-')"
          prefix="Branch-${slug}"

          # --- Helpers ---

          write_or_stub() {
            local source_file="$1"
            local target_file="$2"
            local title="$3"

            if [ -f "$source_file" ]; then
              cp "$source_file" "$target_file"
            else
              printf '# %s\n\nNo source file was found at `%s` on branch `%s`.\n' \
                "$title" "${source_file#src/}" "$BRANCH_NAME" > "$target_file"
            fi
          }

          wrap_json_as_page() {
            local source_file="$1"
            local target_file="$2"
            local title="$3"

            if [ -f "$source_file" ]; then
              {
                echo "# ${title}"
                echo
                echo "Source: \`${source_file#src/}\` on branch \`${BRANCH_NAME}\`"
                echo
                echo '```json'
                cat "$source_file"
                echo '```'
              } > "$target_file"
            else
              printf '# %s\n\nNo source file was found at `%s` on branch `%s`.\n' \
                "$title" "${source_file#src/}" "$BRANCH_NAME" > "$target_file"
            fi
          }

          # Track generated page links for Overview
          overview_core=()
          overview_platform=()
          overview_arch=()
          overview_specs=()
          overview_api=()
          overview_status=()

          # --- 1. Core root documents ---

          write_or_stub "src/README.md" "wiki/${prefix}-README.md" "README (${BRANCH_NAME})"
          overview_core+=("- [README](${prefix}-README)")

          write_or_stub "src/CHANGELOG.md" "wiki/${prefix}-Changelog.md" "Changelog (${BRANCH_NAME})"
          overview_core+=("- [Changelog](${prefix}-Changelog)")

          write_or_stub "src/LICENSE.md" "wiki/${prefix}-License.md" "License (${BRANCH_NAME})"
          overview_core+=("- [License](${prefix}-License)")

          # --- 2. Platform-specific documents ---

          # Detect platform directory
          platform_dir=""
          for pdir in src/platform/windows src/platform/macos src/platform/ios; do
            if [ -d "$pdir" ]; then
              platform_dir="$pdir"
              break
            fi
          done

          if [ -n "$platform_dir" ]; then
            pname="$(basename "$platform_dir")"

            # Platform README
            write_or_stub "${platform_dir}/README.md" "wiki/${prefix}-Platform-README.md" "Platform README — ${pname} (${BRANCH_NAME})"
            overview_platform+=("- [Platform README](${prefix}-Platform-README)")

            # Platform policy doc (Apple branches)
            if [ -f "${platform_dir}/docs/platform_policy_apple.md" ]; then
              cp "${platform_dir}/docs/platform_policy_apple.md" "wiki/${prefix}-Platform-Policy.md"
              overview_platform+=("- [Platform Policy](${prefix}-Platform-Policy)")
            fi

            # Platform manifest
            if [ -f "${platform_dir}/PLATFORM_MANIFEST.json" ]; then
              wrap_json_as_page "${platform_dir}/PLATFORM_MANIFEST.json" "wiki/${prefix}-Platform-Manifest.md" "Platform Manifest — ${pname} (${BRANCH_NAME})"
              overview_platform+=("- [Platform Manifest](${prefix}-Platform-Manifest)")
            fi
          fi

          # Governance policy
          wrap_json_as_page "src/agentic-coding-policy.json" "wiki/${prefix}-Governance-Policy.md" "Governance Policy (${BRANCH_NAME})"
          overview_platform+=("- [Governance Policy](${prefix}-Governance-Policy)")

          # --- 3. Architecture documents ---

          if [ -d src/specs/architecture ]; then
            for arch_file in src/specs/architecture/*.md; do
              [ -f "$arch_file" ] || continue
              fname="$(basename "$arch_file" .md)"
              # Convert snake_case to Title-Case for page name
              page_slug="$(echo "$fname" | sed 's/_/-/g')"
              page_title="$(echo "$fname" | sed 's/_/ /g; s/\b\(.\)/\u\1/g')"

              cp "$arch_file" "wiki/${prefix}-Arch-${page_slug}.md"
              overview_arch+=("- [${page_title}](${prefix}-Arch-${page_slug})")
            done
          fi

          # --- 4. Algorithm specs ---

          if [ -d src/specs/algorithms ]; then
            for algo_file in src/specs/algorithms/*.pseudo.md; do
              [ -f "$algo_file" ] || continue
              fname="$(basename "$algo_file" .pseudo.md)"
              page_slug="$(echo "$fname" | sed 's/_/-/g')"
              page_title="$(echo "$fname" | sed 's/_/ /g; s/\b\(.\)/\u\1/g')"

              cp "$algo_file" "wiki/${prefix}-Algo-${page_slug}.md"
              overview_specs+=("- [Algorithm: ${page_title}](${prefix}-Algo-${page_slug})")
            done
          fi

          # --- 5. Interface specs ---

          if [ -d src/specs/interfaces ]; then
            for iface_file in src/specs/interfaces/*.pseudo.md; do
              [ -f "$iface_file" ] || continue
              fname="$(basename "$iface_file" .pseudo.md)"

              cp "$iface_file" "wiki/${prefix}-Interface-${fname}.md"
              overview_specs+=("- [Interface: ${fname}](${prefix}-Interface-${fname})")
            done
          fi

          # --- 6. Contract schemas ---

          if [ -d src/specs/contracts ]; then
            for schema_file in src/specs/contracts/*.schema.json; do
              [ -f "$schema_file" ] || continue
              fname="$(basename "$schema_file" .schema.json)"

              wrap_json_as_page "$schema_file" "wiki/${prefix}-Contract-${fname}.md" "Contract: ${fname} (${BRANCH_NAME})"
              overview_specs+=("- [Contract: ${fname}](${prefix}-Contract-${fname})")
            done
          fi

          # --- 7. Acceptance criteria ---

          if [ -d src/specs/acceptance ]; then
            for acc_file in src/specs/acceptance/*.md; do
              [ -f "$acc_file" ] || continue
              fname="$(basename "$acc_file" .md)"
              page_slug="$(echo "$fname" | sed 's/_/-/g')"
              page_title="$(echo "$fname" | sed 's/_/ /g; s/\b\(.\)/\u\1/g')"

              cp "$acc_file" "wiki/${prefix}-Acceptance-${page_slug}.md"
              overview_specs+=("- [${page_title}](${prefix}-Acceptance-${page_slug})")
            done
          fi

          # --- 8. Specs Index (full listing) ---

          specs_page="wiki/${prefix}-Specs-Index.md"
          {
            echo "# Specs Index (${BRANCH_NAME})"
            echo
            if [ -d src/specs ]; then
              find src/specs -type f | sed 's#^src/##' | sort | awk '{print "- `" $0 "`"}'
            else
              echo "No \`specs/\` directory is present on this branch."
            fi
          } > "$specs_page"
          overview_specs+=("- [Specs Index (full listing)](${prefix}-Specs-Index)")

          # --- 9. API / Module Reference ---

          api_page="wiki/${prefix}-API-Reference.md"
          if [ -d src/include/AeostaraCore ]; then
            # C++ branch — use header parser
            python src/.github/scripts/parse-headers.py src/include/AeostaraCore "$api_page"
            overview_api+=("- [C++ API Reference](${prefix}-API-Reference)")
          elif [ -d src/AeostaraCore/include/AeostaraCore ]; then
            python src/.github/scripts/parse-headers.py src/AeostaraCore/include/AeostaraCore "$api_page"
            overview_api+=("- [C++ API Reference](${prefix}-API-Reference)")
          elif [ -f src/Package.swift ]; then
            # Swift branch — use module parser
            chmod +x src/.github/scripts/parse-swift-modules.sh
            BRANCH_NAME="${BRANCH_NAME}" bash src/.github/scripts/parse-swift-modules.sh src "$api_page"
            overview_api+=("- [Swift Module Reference](${prefix}-API-Reference)")
          else
            printf '# API Reference (%s)\n\nNo public headers or Swift modules were found on this branch.\n' \
              "$BRANCH_NAME" > "$api_page"
            overview_api+=("- [API Reference](${prefix}-API-Reference)")
          fi

          # --- 10. Status documents ---

          write_or_stub "src/PHASE_5_CLOSEOUT.md" "wiki/${prefix}-Phase-5-Closeout.md" "Phase 5 Closeout (${BRANCH_NAME})"
          overview_status+=("- [Phase 5 Closeout](${prefix}-Phase-5-Closeout)")

          write_or_stub "src/PLATFORM_STATUS_MATRIX.md" "wiki/${prefix}-Platform-Status-Matrix.md" "Platform Status Matrix (${BRANCH_NAME})"
          overview_status+=("- [Platform Status Matrix](${prefix}-Platform-Status-Matrix)")

          # --- 11. Generate Overview page ---

          {
            echo "# ${BRANCH_NAME} Branch Wiki"
            echo
            echo "Last synced: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Source commit: \`${COMMIT_SHA}\`"
            echo

            echo "## Core"
            printf '%s\n' "${overview_core[@]}"
            echo

            if [ ${#overview_platform[@]} -gt 0 ]; then
              echo "## Platform"
              printf '%s\n' "${overview_platform[@]}"
              echo
            fi

            if [ ${#overview_arch[@]} -gt 0 ]; then
              echo "## Architecture"
              printf '%s\n' "${overview_arch[@]}"
              echo
            fi

            if [ ${#overview_specs[@]} -gt 0 ]; then
              echo "## Specifications"
              printf '%s\n' "${overview_specs[@]}"
              echo
            fi

            if [ ${#overview_api[@]} -gt 0 ]; then
              echo "## API / Module Reference"
              printf '%s\n' "${overview_api[@]}"
              echo
            fi

            if [ ${#overview_status[@]} -gt 0 ]; then
              echo "## Status"
              printf '%s\n' "${overview_status[@]}"
              echo
            fi
          } > "wiki/${prefix}-Overview.md"

          # --- 12. Update branch index and Home page ---

          index_file="wiki/.branch-index.tsv"
          touch "$index_file"

          tmp_file="$(mktemp)"
          awk -F '\t' -v slug="$slug" -v branch="$BRANCH_NAME" '
            BEGIN { updated=0 }
            NF {
              if ($1 == slug) {
                print slug "\t" branch
                updated=1
              } else {
                print $0
              }
            }
            END {
              if (!updated) {
                print slug "\t" branch
              }
            }
          ' "$index_file" | sort -u > "$tmp_file"
          mv "$tmp_file" "$index_file"

          {
            echo "# Aeostara Wiki"
            echo
            echo "Branch-scoped documentation synced automatically from repository updates."
            echo
            echo "## Branches"
            while IFS=$'\t' read -r entry_slug entry_branch; do
              [ -z "${entry_slug}" ] && continue
              echo "- [\`${entry_branch}\`](Branch-${entry_slug}-Overview)"
            done < "$index_file"
          } > wiki/Home.md

      - name: Commit and push wiki updates
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          COMMIT_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          cd wiki

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && echo "No wiki changes" && exit 0

          short_sha="$(echo "$COMMIT_SHA" | cut -c1-7)"
          git commit -m "docs(wiki): sync ${BRANCH_NAME} (${short_sha})"

          # Detect wiki default branch (main or master)
          WIKI_BRANCH="main"
          git ls-remote --heads origin master >/dev/null 2>&1 && WIKI_BRANCH="master"

          for attempt in 1 2 3; do
            # Rebase on remote before pushing to avoid non-fast-forward
            git fetch origin "$WIKI_BRANCH" 2>/dev/null || true
            git rebase "origin/${WIKI_BRANCH}" 2>/dev/null || {
              git rebase --abort 2>/dev/null || true
              # If rebase fails, force-reset and re-apply our changes
              git reset --soft "origin/${WIKI_BRANCH}" 2>/dev/null || true
              git commit -m "docs(wiki): sync ${BRANCH_NAME} (${short_sha})" --allow-empty 2>/dev/null || true
            }

            if git push origin "HEAD:${WIKI_BRANCH}"; then
              exit 0
            fi

            echo "Push attempt ${attempt} failed; retrying in 3s"
            sleep 3
          done

          echo "Failed to push wiki updates after retries"
          exit 1
