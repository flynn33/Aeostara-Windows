# Aeostara Wiki Maintenance Sweep
# Periodically regenerates wiki dashboards for all primary branches.

name: Wiki Maintenance Sweep

on:
  schedule:
    - cron: '22 4 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sweep:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Clone wiki repository
        run: |
          set -euo pipefail
          git clone "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git" wiki || {
            mkdir -p wiki
            cd wiki
            git init
            git checkout -b main
            git remote add origin "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.wiki.git"
          }

      - name: Generate pages for main and platform branches
        run: |
          set -euo pipefail

          branches=("main" "platform/windows" "platform/macos" "platform/ios")

          for branch in "${branches[@]}"; do
            slug="${branch//\//__slash__}"
            wt="worktree-${slug}"

            git worktree add "$wt" "origin/$branch"
            commit_sha="$(git -C "$wt" rev-parse HEAD)"

            python3 "$wt/.github/scripts/generate_wiki_pages.py" \
              --src-dir "$wt" \
              --wiki-dir "wiki" \
              --branch-name "$branch" \
              --commit-sha "$commit_sha"

            git worktree remove "$wt" --force
          done

      - name: Commit and push wiki updates
        run: |
          set -euo pipefail
          cd wiki

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -A
          git diff --cached --quiet && echo "No wiki changes" && exit 0

          git commit -m "docs(wiki): maintenance sweep"

          WIKI_BRANCH="main"
          git ls-remote --heads origin master >/dev/null 2>&1 && WIKI_BRANCH="master"

          git fetch origin "$WIKI_BRANCH" 2>/dev/null || true
          git rebase "origin/${WIKI_BRANCH}" 2>/dev/null || {
            git rebase --abort 2>/dev/null || true
          }

          git push origin "HEAD:${WIKI_BRANCH}"
