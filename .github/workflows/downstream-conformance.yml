name: Downstream Conformance

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  downstream-conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify local base pin
        run: |
          set -euo pipefail
          grep -q "774b981ef2267a41c1b1a59497b2b0746a86f32b" AEOSTARA_BASELINE_REFERENCE.md
          grep -q "e123f5d7fdbb381179971f721a3292c31eb1cbc2" AEOSTARA_BASELINE_REFERENCE.md

      - name: Verify migration provenance
        run: |
          set -euo pipefail
          grep -q "0b5072181eb0576ba94018b5d7f945309bf2b8e5" MIGRATION_PROVENANCE.md
          grep -q "import/platform-windows-0b50721" MIGRATION_PROVENANCE.md
