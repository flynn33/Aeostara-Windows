# Aeostara Platform Compliance and Branch Alignment Audit

name: Compliance Audit

on:
  push:
    branches:
      - 'platform/**'
  pull_request:
    branches:
      - 'platform/**'

jobs:
  compliance-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run source safety compliance checker
        run: python ci/compliance_checker.py . --mode source-safety

      - name: Resolve branch alignment profile
        id: profile
        shell: bash
        run: |
          case "${GITHUB_REF_NAME}" in
            "platform/windows") echo "name=platform_windows" >> "$GITHUB_OUTPUT" ;;
            "platform/macos") echo "name=platform_macos" >> "$GITHUB_OUTPUT" ;;
            "platform/ios") echo "name=platform_ios" >> "$GITHUB_OUTPUT" ;;
            *) echo "name=main" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run branch alignment checker
        run: python ci/branch_alignment_checker.py . --profile "${{ steps.profile.outputs.name }}"
